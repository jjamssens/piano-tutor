<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- App background gradient: deep navy to dark indigo -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1e1040"/>
    </linearGradient>
    <!-- Key white gradient (subtle top highlight) -->
    <linearGradient id="wkey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#cdd5f0"/>
    </linearGradient>
    <!-- Lit key glow gradient (indigo/violet) -->
    <linearGradient id="litkey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Glow filter for lit key -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle drop shadow for keyboard block -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- ── Keyboard block ─────────────────────────────────── -->
  <!-- 7 white keys, centred, with 3 black keys above -->

  <g filter="url(#shadow)">
    <!-- White keys (7 keys, each 52px wide, 4px gap → total = 7×52+6×4 = 388px; left = (512-388)/2 = 62) -->
    <!-- Key order: C D E F G A B (indices 0-6) -->
    <!-- Positions: 62, 118, 174, 230, 286, 342, 398 -->

    <!-- Key C (index 0) — lit -->
    <rect x="62"  y="268" width="52" height="160" rx="6" fill="url(#litkey)" filter="url(#glow)"/>
    <!-- Key D -->
    <rect x="118" y="268" width="52" height="160" rx="6" fill="url(#wkey)"/>
    <!-- Key E -->
    <rect x="174" y="268" width="52" height="160" rx="6" fill="url(#wkey)"/>
    <!-- Key F -->
    <rect x="230" y="268" width="52" height="160" rx="6" fill="url(#wkey)"/>
    <!-- Key G — lit -->
    <rect x="286" y="268" width="52" height="160" rx="6" fill="url(#litkey)" filter="url(#glow)"/>
    <!-- Key A -->
    <rect x="342" y="268" width="52" height="160" rx="6" fill="url(#wkey)"/>
    <!-- Key B — lit -->
    <rect x="398" y="268" width="52" height="160" rx="6" fill="url(#litkey)" filter="url(#glow)"/>

    <!-- Black keys (C#, D#, F#, G#, A#) -->
    <!-- C# between C(62) and D(118): x = 62+52-16 = 98 -->
    <rect x="98"  y="268" width="36" height="96" rx="4" fill="#1a1a2e"/>
    <!-- D# between D(118) and E(174): x = 118+52-16 = 154 -->
    <rect x="154" y="268" width="36" height="96" rx="4" fill="#1a1a2e"/>
    <!-- F# between F(230) and G(286): x = 230+52-16 = 266 -->
    <rect x="266" y="268" width="36" height="96" rx="4" fill="#1a1a2e"/>
    <!-- G# between G(286) and A(342): x = 286+52-16 = 322 -->
    <rect x="322" y="268" width="36" height="96" rx="4" fill="#1a1a2e"/>
    <!-- A# between A(342) and B(398): x = 342+52-16 = 378 -->
    <rect x="378" y="268" width="36" height="96" rx="4" fill="#1a1a2e"/>
  </g>

  <!-- ── Musical note ──────────────────────────────────── -->
  <!-- Centred above the keyboard, glowing violet -->
  <g filter="url(#glow)" fill="#c4b5fd">
    <!-- Note head (filled ellipse) -->
    <ellipse cx="218" cy="172" rx="28" ry="22" transform="rotate(-20 218 172)"/>
    <!-- Stem -->
    <rect x="242" y="82" width="10" height="96" rx="4"/>
    <!-- Flag -->
    <path d="M252 82 C310 110 310 148 270 160" stroke="#c4b5fd" stroke-width="10" fill="none" stroke-linecap="round"/>

    <!-- Second note — offset right, smaller -->
    <ellipse cx="308" cy="148" rx="22" ry="17" transform="rotate(-20 308 148)"/>
    <rect x="328" y="68" width="8" height="84" rx="4"/>
    <!-- Beam connecting stems -->
    <rect x="242" y="82" width="94" height="10" rx="4"/>
  </g>

  <!-- ── "PT" wordmark (subtle, bottom centre) -->
  <text x="256" y="490" text-anchor="middle"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="700" letter-spacing="6"
        fill="#6d5fa8" opacity="0.7">PIANO TUTOR</text>
</svg>

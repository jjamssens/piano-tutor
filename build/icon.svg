<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#1a1340"/>
      <stop offset="100%" stop-color="#080612"/>
    </linearGradient>
    <linearGradient id="wk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#edf0fb"/>
      <stop offset="100%" stop-color="#c8d0ea"/>
    </linearGradient>
    <linearGradient id="lk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <filter id="keyglow" x="-35%" y="-15%" width="170%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="noteglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- ── Musical notes (upper centre) ───────────────────────── -->
  <g fill="#c4b5fd" filter="url(#noteglow)">
    <!-- Note 1 head -->
    <ellipse cx="196" cy="218" rx="28" ry="20" transform="rotate(-18 196 218)"/>
    <!-- Note 1 stem -->
    <rect x="219" y="108" width="11" height="116" rx="4"/>

    <!-- Note 2 head (higher on the scale — step up) -->
    <ellipse cx="308" cy="194" rx="28" ry="20" transform="rotate(-18 308 194)"/>
    <!-- Note 2 stem -->
    <rect x="331" y="84" width="11" height="116" rx="4"/>

    <!-- Beam connecting stem tops (slants upward left→right) -->
    <path d="M219 108 L342 84 L342 102 L219 126 Z"/>
  </g>

  <!-- ── Piano keyboard ─────────────────────────────────────── -->
  <!-- 7 white keys: pitch=56 (52px + 4px gap), x_start=62, y_top=296, h=172 -->
  <!-- C(62) D(118) E(174) F(230) G(286) A(342) B(398) -->

  <!-- C — lit (C major chord) -->
  <rect x="62"  y="296" width="52" height="172" rx="7" fill="url(#lk)" filter="url(#keyglow)"/>
  <!-- D -->
  <rect x="118" y="296" width="52" height="172" rx="7" fill="url(#wk)"/>
  <!-- E — lit -->
  <rect x="174" y="296" width="52" height="172" rx="7" fill="url(#lk)" filter="url(#keyglow)"/>
  <!-- F -->
  <rect x="230" y="296" width="52" height="172" rx="7" fill="url(#wk)"/>
  <!-- G — lit -->
  <rect x="286" y="296" width="52" height="172" rx="7" fill="url(#lk)" filter="url(#keyglow)"/>
  <!-- A -->
  <rect x="342" y="296" width="52" height="172" rx="7" fill="url(#wk)"/>
  <!-- B -->
  <rect x="398" y="296" width="52" height="172" rx="7" fill="url(#wk)"/>

  <!-- Black keys: w=34, h=104, same y_top=296 -->
  <!-- Positions: x = white_key_x + 52 - 17 -->
  <!-- C#=97, D#=153, F#=265, G#=321, A#=377 -->
  <rect x="97"  y="296" width="34" height="104" rx="5" fill="#0f0c1e"/>
  <rect x="153" y="296" width="34" height="104" rx="5" fill="#0f0c1e"/>
  <rect x="265" y="296" width="34" height="104" rx="5" fill="#0f0c1e"/>
  <rect x="321" y="296" width="34" height="104" rx="5" fill="#0f0c1e"/>
  <rect x="377" y="296" width="34" height="104" rx="5" fill="#0f0c1e"/>

  <!-- Glow halos beneath lit keys -->
  <ellipse cx="88"  cy="480" rx="34" ry="12" fill="#7c3aed" opacity="0.4"/>
  <ellipse cx="200" cy="480" rx="34" ry="12" fill="#7c3aed" opacity="0.4"/>
  <ellipse cx="312" cy="480" rx="34" ry="12" fill="#7c3aed" opacity="0.4"/>
</svg>

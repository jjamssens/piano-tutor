name: Build & Release

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.0, v1.1.0, etc.
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

permissions:
  contents: write     # required to create GitHub Releases and upload assets

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Build & package macOS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When you have an Apple Developer account, add these secrets in
          # GitHub → Settings → Secrets and set CSC_LINK and CSC_KEY_PASSWORD.
          # CSC_LINK: ${{ secrets.CSC_LINK }}           # base64 .p12 certificate
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}           # for notarization
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist:mac -- --publish always

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Build & package Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When you have a Windows code signing certificate, add:
          # WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm run dist:win -- --publish always

  notify-gumroad:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Get release version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update Gumroad product content URL
        # Gumroad API docs: https://app.gumroad.com/api
        # Required secrets (set in GitHub → Settings → Secrets → Actions):
        #   GUMROAD_ACCESS_TOKEN  — from gumroad.com/settings/advanced → Applications
        #   GUMROAD_PRODUCT_ID    — the product permalink ID (from your Gumroad product URL)
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          GUMROAD_PRODUCT_ID: ${{ secrets.GUMROAD_PRODUCT_ID }}
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          RELEASE_URL="https://github.com/jjamssens/piano-tutor/releases/tag/${VERSION}"
          echo "Pointing Gumroad product to release: $RELEASE_URL"
          curl -s -X PUT "https://api.gumroad.com/v2/products/${GUMROAD_PRODUCT_ID}" \
            -d "access_token=${GUMROAD_ACCESS_TOKEN}" \
            -d "custom_summary=Version ${VERSION} — download links below" \
            --fail-with-body
          echo "Gumroad product updated for ${VERSION}"

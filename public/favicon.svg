<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="lit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="#0f172a"/>

  <!-- 5 white keys — C D E F G — each 10px wide, 1px gap, x_start=5, y=13–51 -->
  <rect x="5"  y="13" width="10" height="38" rx="2" fill="url(#lit)" filter="url(#glow)"/>
  <rect x="16" y="13" width="10" height="38" rx="2" fill="#dde3f8"/>
  <rect x="27" y="13" width="10" height="38" rx="2" fill="url(#lit)" filter="url(#glow)"/>
  <rect x="38" y="13" width="10" height="38" rx="2" fill="#dde3f8"/>
  <rect x="49" y="13" width="10" height="38" rx="2" fill="url(#lit)" filter="url(#glow)"/>

  <!-- 3 black keys — C# D# F# — w=7, h=23 -->
  <rect x="12" y="13" width="7" height="23" rx="1.5" fill="#111827"/>
  <rect x="23" y="13" width="7" height="23" rx="1.5" fill="#111827"/>
  <rect x="45" y="13" width="7" height="23" rx="1.5" fill="#111827"/>

  <!-- Subtle glow halos beneath lit keys -->
  <ellipse cx="10"  cy="56" rx="6" ry="3" fill="#7c3aed" opacity="0.35"/>
  <ellipse cx="32"  cy="56" rx="6" ry="3" fill="#7c3aed" opacity="0.35"/>
  <ellipse cx="54"  cy="56" rx="6" ry="3" fill="#7c3aed" opacity="0.35"/>
</svg>
